name: K8s — lint Helm charts

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
  pull_request:
    branches: [main]
    paths:
      - "k8s/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: k8s-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    env:
      KUBECONFORM_VERSION: v0.6.7
      KUBE_SCHEMA_VERSION: "1.30.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install kubeconform
        env:
          VERSION: ${{ env.KUBECONFORM_VERSION }}
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 2 \
            "https://github.com/yannh/kubeconform/releases/download/${VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz
          sudo install -m755 kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint (devops-api)
        run: helm lint k8s/helm/devops-api/

      - name: Helm lint (devops-worker)
        run: helm lint k8s/helm/devops-worker/

      # kubectl apply --dry-run=client can still try to fetch OpenAPI from the apiserver (e.g. localhost:8080).
      # kubeconform validates rendered YAML against pinned K8s OpenAPI schemas — no cluster or kubeconfig needed.
      - name: Helm template + kubeconform (devops-api)
        run: >-
          helm template devops-api k8s/helm/devops-api/
          | kubeconform
          -kubernetes-version ${{ env.KUBE_SCHEMA_VERSION }}
          -summary
          -

      - name: Helm template + kubeconform (devops-worker)
        run: >-
          helm template devops-worker k8s/helm/devops-worker/
          | kubeconform
          -kubernetes-version ${{ env.KUBE_SCHEMA_VERSION }}
          -summary
          -
