name: CI - Build & Push Docker Image

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "worker/**"
      - "scripts/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            worker/package-lock.json

      - name: Install app dependencies
        working-directory: ./app
        run: npm ci

      - name: Install worker dependencies
        working-directory: ./worker
        run: npm ci

      - name: Run tests
        working-directory: ./app
        run: npm test

      - name: Run lint
        working-directory: ./app
        run: npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-api:${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install health check dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run health check
        run: |
          cleanup() { docker rm -f test 2>/dev/null || true; }
          trap cleanup EXIT
          docker run -d -p 3000:3000 --name test ${{ secrets.DOCKERHUB_USERNAME }}/devops-api:${{ github.sha }}
          python scripts/health_check.py --alb-dns localhost:3000 --retries 5 --skip-aws