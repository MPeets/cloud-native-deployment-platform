name: Scripts — pylint

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "migrations/**"
      - ".github/workflows/scripts-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - "migrations/**"
      - ".github/workflows/scripts-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install script deps and pylint
        run: pip install -r scripts/requirements.txt pylint

      - name: Lint scripts
        run: python -m pylint scripts/

  migrate-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cloud-native-deployment-platform
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d cloud-native-deployment-platform"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/cloud-native-deployment-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install script dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run migrations (cold database)
        run: python scripts/run_migrations.py

      - name: Run migrations again (idempotent replay)
        run: python scripts/run_migrations.py