name: Scripts — pylint

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"

permissions:
  contents: read

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pylint
        run: pip install pylint

      - name: Lint scripts
        run: python -m pylint scripts/
