name: Terraform Apply

permissions:
  contents: read
  actions: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: Type "apply" to create or update the infrastructure.
        required: true
        type: choice
        default: "no"
        options:
          - "no"
          - "apply"
  workflow_run:
    workflows: ["Terraform Plan"]
    types: [completed]

concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  apply:
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.confirm_apply == 'apply') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    environment: production
    env:
      TF_VAR_ami_id: ${{ vars.TF_AMI_ID }}
      TF_VAR_docker_image: ${{ vars.TF_DOCKER_IMAGE }}
      TF_VAR_ssh_allowed_cidrs: ${{ secrets.TF_SSH_ALLOWED_CIDRS }}
      TF_VAR_aws_region: ${{ vars.TF_AWS_REGION }}
      TF_VAR_enable_ecs: ${{ vars.TF_ENABLE_ECS }}
      TF_VAR_enable_ec2: ${{ vars.TF_ENABLE_EC2 }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.TF_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event_name == 'workflow_dispatch'
        run: terraform plan -lock-timeout=10m -out=tfplan

      - name: Download Terraform Plan Artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v7
        with:
          name: terraform-plan-${{ github.event.workflow_run.head_sha }}
          path: infra
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Terraform Apply
        run: terraform apply -lock-timeout=10m tfplan

      - name: Get ALB DNS from Terraform output
        run: echo "ALB_DNS=$(terraform output -raw alb_dns_name)" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install health check dependencies
        working-directory: ${{ github.workspace }}
        run: pip install -r scripts/requirements.txt

      - name: Post-deploy health check
        working-directory: ${{ github.workspace }}
        run: python scripts/health_check.py
        env:
          AWS_REGION: ${{ vars.TF_AWS_REGION }}
