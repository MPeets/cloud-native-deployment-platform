name: Terraform Apply

permissions:
  contents: read
  actions: read
  id-token: write

on:
  workflow_run:
    workflows: ["Terraform Plan"]
    types: [completed]

jobs:
  apply:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    environment: production
    env:
      TF_VAR_ami_id: ${{ vars.TF_AMI_ID }}
      TF_VAR_docker_image: ${{ vars.TF_DOCKER_IMAGE }}
      TF_VAR_ssh_allowed_cidrs: ${{ secrets.TF_SSH_ALLOWED_CIDRS }}
      TF_VAR_aws_region: ${{ vars.TF_AWS_REGION }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.TF_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.event.workflow_run.head_sha }}
          path: infra
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Terraform Apply
        run: terraform apply tfplan