name: Terraform Apply

permissions:
  contents: read
  actions: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: Type "apply" to create or update the infrastructure.
        required: true
        type: choice
        default: "no"
        options:
          - "no"
          - "apply"
  workflow_run:
    workflows: ["Terraform Plan"]
    types: [completed]

concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  apply:
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.confirm_apply == 'apply') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    environment: production
    env:
      TF_INFRA_ENVIRONMENT: ${{ vars.TF_INFRA_ENVIRONMENT }}
      TF_VAR_ami_id: ${{ vars.TF_AMI_ID }}
      TF_VAR_database_url_secret_arn: ${{ secrets.TF_DATABASE_URL_SECRET_ARN }}
      TF_VAR_ssh_allowed_cidrs: ${{ secrets.TF_SSH_ALLOWED_CIDRS }}
      TF_VAR_aws_region: ${{ vars.TF_AWS_REGION }}
      TF_VAR_enable_ecs: ${{ vars.TF_ENABLE_ECS }}
      TF_VAR_enable_ec2: ${{ vars.TF_ENABLE_EC2 }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve container images from latest Docker CI on main
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: bash "${GITHUB_WORKSPACE}/scripts/ci_resolve_terraform_container_images.sh"

      - name: Require immutable container image refs
        run: bash "${GITHUB_WORKSPACE}/scripts/ci_require_immutable_container_tags.sh"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.TF_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: |
          ENV_NAME="${TF_INFRA_ENVIRONMENT:-prod}"
          terraform init -backend-config="envs/${ENV_NAME}/backend.hcl" -reconfigure

      - name: Terraform Plan
        if: github.event_name == 'workflow_dispatch'
        run: |
          ENV_NAME="${TF_INFRA_ENVIRONMENT:-prod}"
          terraform plan \
            -lock-timeout=10m \
            -var-file="envs/${ENV_NAME}/terraform.tfvars" \
            -out=tfplan

      - name: Download Terraform Plan Artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v7
        with:
          name: terraform-plan-${{ github.event.workflow_run.head_sha }}
          path: infra
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Terraform Apply
        run: terraform apply -lock-timeout=10m tfplan

      - name: Get ALB DNS from Terraform output
        run: echo "ALB_DNS=$(terraform output -raw alb_dns_name)" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install health check dependencies
        working-directory: ${{ github.workspace }}
        run: pip install -r scripts/requirements.txt

      - name: Post-deploy health check
        working-directory: ${{ github.workspace }}
        env:
          AWS_REGION: ${{ vars.TF_AWS_REGION }}
          TF_INFRA_ENVIRONMENT: ${{ vars.TF_INFRA_ENVIRONMENT }}
        run: |
          max_attempts=12
          sleep_seconds=30
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Health check attempt ${attempt}/${max_attempts}..."
            if python scripts/health_check.py; then
              exit 0
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Health check failed after ${max_attempts} attempts."
              exit 1
            fi
            echo "Waiting ${sleep_seconds}s before retry..."
            sleep "$sleep_seconds"
          done