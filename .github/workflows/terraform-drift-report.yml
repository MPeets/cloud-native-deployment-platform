name: Terraform Drift Report

permissions:
  contents: read
  id-token: write

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  drift-report:
    runs-on: ubuntu-latest
    env:
      TF_VAR_ami_id: ${{ vars.TF_AMI_ID }}
      TF_VAR_docker_image: ${{ vars.TF_DOCKER_IMAGE }}
      TF_VAR_ssh_allowed_cidrs: ${{ secrets.TF_SSH_ALLOWED_CIDRS }}
      TF_VAR_aws_region: ${{ vars.TF_AWS_REGION }}
      TF_VAR_enable_ecs: ${{ vars.TF_ENABLE_ECS }}
      TF_VAR_enable_ec2: ${{ vars.TF_ENABLE_EC2 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.TF_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Generate drift report
        id: drift
        run: |
          set +e
          python scripts/terraform_drift_report.py \
            --terraform-dir infra \
            --output terraform-drift-report.md
          status=$?
          set -e

          {
            echo "## Terraform drift report"
            echo ""
            cat terraform-drift-report.md
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$status"

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: terraform-drift-report
          path: terraform-drift-report.md