name: Terraform Plan

permissions:
  contents: read
  id-token: write

on:
  pull_request:
    branches: ["main"]
    paths:
      - "infra/**"
  push:
    branches: ["main"]
    paths:
      - "infra/**"

concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_INFRA_ENVIRONMENT: ${{ vars.TF_INFRA_ENVIRONMENT }}
      TF_VAR_ami_id: ${{ vars.TF_AMI_ID }}
      TF_VAR_docker_image: ${{ vars.TF_DOCKER_IMAGE }}
      TF_VAR_worker_image: ${{ vars.TF_WORKER_IMAGE }}
      TF_VAR_database_url_secret_arn: ${{ secrets.TF_DATABASE_URL_SECRET_ARN }}
      TF_VAR_ssh_allowed_cidrs: ${{ secrets.TF_SSH_ALLOWED_CIDRS }}
      TF_VAR_aws_region: ${{ vars.TF_AWS_REGION }}
      TF_VAR_enable_ecs: ${{ vars.TF_ENABLE_ECS }}
      TF_VAR_enable_ec2: ${{ vars.TF_ENABLE_EC2 }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.62.0

      - name: TFLint init
        working-directory: infra
        run: tflint --init

      - name: TFLint
        working-directory: infra
        run: tflint --recursive --minimum-failure-severity error

      - name: Install tfsec
        env:
          TFSEC_VERSION: v1.28.14
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/aquasecurity/tfsec/releases/download/${TFSEC_VERSION}/tfsec-linux-amd64" -o tfsec
          chmod +x tfsec
          sudo mv tfsec /usr/local/bin/tfsec
          tfsec --version

      - name: tfsec
        working-directory: infra
        run: tfsec . --no-module-downloads --soft-fail

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.TF_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: |
          ENV_NAME="${TF_INFRA_ENVIRONMENT:-prod}"
          terraform init -backend-config="envs/${ENV_NAME}/backend.hcl" -reconfigure

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Bootstrap Init
        run: terraform -chdir=bootstrap init -backend=false

      - name: Terraform Bootstrap Validate
        run: terraform -chdir=bootstrap validate

      - name: Terraform Plan
        run: |
          ENV_NAME="${TF_INFRA_ENVIRONMENT:-prod}"
          terraform plan \
            -lock-timeout=10m \
            -var-file="envs/${ENV_NAME}/terraform.tfvars" \
            -out=tfplan

      - name: Upload Terraform Plan Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v6
        with:
          name: terraform-plan-${{ github.sha }}
          path: infra/tfplan
          retention-days: 7