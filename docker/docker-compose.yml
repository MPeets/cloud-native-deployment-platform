services:
  api:
    build: ../app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/cloud-native-deployment-platform
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    image: python:3.12-slim
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/cloud-native-deployment-platform
    volumes:
      - ../scripts/run_migrations.py:/scripts/run_migrations.py:ro
      - ../migrations:/migrations:ro
    command:
      [
        'sh',
        '-c',
        'pip install --no-cache-dir -q psycopg2-binary && python /scripts/run_migrations.py --migrations-dir /migrations',
      ]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud-native-deployment-platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cloud-native-deployment-platform']
      interval: 2s
      timeout: 5s
      retries: 15

  worker:
    build: ../worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/cloud-native-deployment-platform
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
