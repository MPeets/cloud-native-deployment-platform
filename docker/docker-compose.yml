version: '3'

services:
  api:
    build: ../app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/cloud-native-deployment-platform
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloud-native-deployment-platform
    ports:
      - "5432:5432"

  worker:
    build: ../worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/cloud-native-deployment-platform
    depends_on:
      - db