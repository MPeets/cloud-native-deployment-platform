{{- if and .Values.databaseUrl.url (not .Values.databaseUrl.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-database" (include "devops-worker.fullname" .) }}
  labels:
    {{- include "devops-worker.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.databaseUrl.url | quote }}
{{- end }}
