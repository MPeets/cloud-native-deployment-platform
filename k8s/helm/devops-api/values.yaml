replicaCount: 2

nameOverride: ""
fullnameOverride: ""

image:
  repository: mpeets/devops-api
  tag: latest
  pullPolicy: Always

serviceAccount:
  create: true
  name: ""
  annotations: {}

service:
  type: ClusterIP
  port: 80

containerPort: 3000

# PostgreSQL connection for /ready and DB-backed routes. Prefer existingSecret in prod.
databaseUrl:
  existingSecret: ""
  url: ""

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

ingress:
  enabled: true
  className: nginx
  host: devops-api.local
  path: /
  pathType: Prefix
  tls: []
  # tls example (pair with certificate secret in cluster):
  # - hosts:
  #     - devops-api.local
  #   secretName: devops-api-tls

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
